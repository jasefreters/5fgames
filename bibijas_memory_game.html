<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bibija's Memory Game 🐾</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700;800&family=Nunito:wght@400;700;800&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
    transition: background 1s ease;
  }

  header {
    text-align: center;
    padding: 16px 16px 8px;
  }
  .game-title {
    font-family: 'M PLUS Rounded 1c', sans-serif;
    font-size: 1.9rem;
    font-weight: 800;
    color: #3D2B4A;
    line-height: 1;
  }
  .game-title span { color: #FF6B6B; }
  .subtitle {
    font-size: 0.75rem;
    color: #8c6fa8;
    margin-top: 2px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  /* HUD */
  .hud {
    display: flex;
    justify-content: center;
    gap: 8px;
    padding: 6px 12px 8px;
    flex-wrap: wrap;
  }
  .hud-pill {
    background: white;
    border: 2px solid #3D2B4A;
    border-radius: 999px;
    padding: 4px 14px;
    font-weight: 800;
    font-size: 0.82rem;
    color: #3D2B4A;
    display: flex;
    align-items: center;
    gap: 4px;
    box-shadow: 3px 3px 0 #3D2B4A;
  }
  .hud-pill.points { background: #FFE999; }
  .hud-pill.level  { background: #B5EAD7; }
  .hud-pill.pairs  { background: #FFB3C6; }
  .hud-pill.timer  { background: #AED9F5; }
  .hud-pill.timer.urgent { background: #FF6B6B; color: white; animation: pulse 0.5s infinite alternate; }

  @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.08); } }

  /* HINT */
  .hint-area {
    text-align: center;
    margin-bottom: 6px;
    min-height: 32px;
  }
  #hint-btn {
    display: none;
    background: #FFCBA4;
    border: 2px solid #3D2B4A;
    border-radius: 999px;
    padding: 5px 18px;
    font-family: 'Nunito', sans-serif;
    font-weight: 800;
    font-size: 0.82rem;
    cursor: pointer;
    box-shadow: 3px 3px 0 #3D2B4A;
    transition: transform 0.1s, box-shadow 0.1s;
  }
  #hint-btn:hover { transform: translate(-1px,-1px); box-shadow: 4px 4px 0 #3D2B4A; }
  #hint-btn:active { transform: translate(2px,2px); box-shadow: 1px 1px 0 #3D2B4A; }
  #hint-msg { font-size: 0.76rem; color: #8c6fa8; margin-top: 3px; font-style: italic; }

  /* BOARD */
  #board {
    display: grid;
    gap: 8px;
    padding: 8px 12px 16px;
    max-width: 720px;
    margin: 0 auto;
    justify-items: center;
  }

  /* CARDS */
  .card {
    width: 100%;
    aspect-ratio: 1;
    perspective: 600px;
    cursor: pointer;
  }
  .card-inner {
    width: 100%; height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.42s cubic-bezier(.4,.2,.2,1);
    border-radius: 12px;
  }
  .card.flipped .card-inner { transform: rotateY(180deg); }
  .card.matched .card-inner { transform: rotateY(180deg); }
  .card.matched .card-front { border-color: #2ecc71 !important; box-shadow: 0 0 0 3px #2ecc71, 3px 3px 0 #3D2B4A; }
  .card.hint-glow .card-back { box-shadow: 0 0 0 4px gold, 3px 3px 0 #3D2B4A !important; }

  .card-front, .card-back {
    position: absolute; inset: 0;
    backface-visibility: hidden;
    border-radius: 12px;
    border: 2.5px solid #3D2B4A;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 3px 3px 0 #3D2B4A;
  }
  .card-back { background: #C7B2E0; font-size: 1.6rem; flex-direction: column; gap: 2px; }
  .card-back-emoji { font-size: 1.5rem; }
  .card-back-label { font-size: 0.5rem; font-weight: 800; color: #3D2B4A; text-align: center; letter-spacing: 0.5px; }
  .card-front { transform: rotateY(180deg); background: white; flex-direction: column; gap: 3px; }
  .card-emoji { font-size: 2rem; line-height: 1; }
  .card-label { font-size: 0.55rem; font-weight: 700; color: #3D2B4A; text-align: center; }

  /* BONUS round card back */
  .card-back.bonus-back { background: linear-gradient(135deg, #1a1a2e, #16213e); border-color: gold; }
  .card-back.bonus-back .card-back-label { color: gold; }

  /* LEVEL BANNER */
  #level-banner {
    display: none; position: fixed; inset: 0;
    background: rgba(61,43,74,0.65);
    z-index: 100; align-items: center; justify-content: center;
  }
  #level-banner.show { display: flex; }
  .banner-box {
    background: white; border: 3px solid #3D2B4A;
    border-radius: 24px; padding: 36px 44px;
    text-align: center; box-shadow: 8px 8px 0 #3D2B4A;
    animation: popIn 0.4s cubic-bezier(.17,.67,.35,1.4);
    max-width: 360px; width: 90%;
  }
  .banner-box.bonus-box {
    background: linear-gradient(135deg, #1a1a2e, #16213e);
    border-color: gold; box-shadow: 8px 8px 0 gold;
  }
  .banner-box.bonus-box .banner-title { color: gold; }
  .banner-box.bonus-box .banner-sub { color: #ccc; }
  .banner-emoji { font-size: 3rem; }
  .banner-title { font-family: 'M PLUS Rounded 1c', sans-serif; font-size: 1.5rem; font-weight: 800; color: #3D2B4A; margin: 6px 0 3px; }
  .banner-sub { font-size: 0.88rem; color: #8c6fa8; margin-bottom: 14px; }
  #banner-btn {
    background: #B5EAD7; border: 2.5px solid #3D2B4A;
    border-radius: 999px; padding: 9px 28px;
    font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 0.95rem;
    cursor: pointer; box-shadow: 4px 4px 0 #3D2B4A;
    transition: transform 0.1s, box-shadow 0.1s;
  }
  #banner-btn:hover { transform: translate(-2px,-2px); box-shadow: 6px 6px 0 #3D2B4A; }
  #banner-btn.bonus-start-btn { background: gold; border-color: gold; color: #1a1a2e; box-shadow: 4px 4px 0 gold; }

  /* TIMEOUT SCREEN */
  #timeout-screen {
    display: none; position: fixed; inset: 0;
    background: rgba(30,0,0,0.8); z-index: 150;
    align-items: center; justify-content: center;
  }
  #timeout-screen.show { display: flex; }
  .timeout-box {
    background: #1a1a2e; border: 3px solid #FF6B6B;
    border-radius: 24px; padding: 40px 44px;
    text-align: center; box-shadow: 8px 8px 0 #FF6B6B;
    animation: popIn 0.4s cubic-bezier(.17,.67,.35,1.4);
    max-width: 360px; width: 90%;
  }
  .timeout-emoji { font-size: 3rem; }
  .timeout-title { font-family: 'M PLUS Rounded 1c', sans-serif; font-size: 1.6rem; font-weight: 800; color: #FF6B6B; margin: 8px 0 4px; }
  .timeout-sub { font-size: 0.88rem; color: #ccc; margin-bottom: 16px; }
  #retry-bonus-btn {
    background: #FF6B6B; border: 2.5px solid #FF6B6B; color: white;
    border-radius: 999px; padding: 10px 28px;
    font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 0.95rem;
    cursor: pointer; box-shadow: 4px 4px 0 #a00; margin-right: 8px;
    transition: transform 0.1s;
  }
  #retry-bonus-btn:hover { transform: translate(-1px,-1px); }

  /* WIN SCREEN */
  #win-screen {
    display: none; position: fixed; inset: 0;
    background: rgba(61,43,74,0.75); z-index: 200;
    align-items: center; justify-content: center;
  }
  #win-screen.show { display: flex; }
  .win-box {
    background: linear-gradient(135deg, #FFB3C6, #C7B2E0, #B5EAD7);
    border: 3px solid #3D2B4A; border-radius: 28px;
    padding: 46px 36px; text-align: center;
    box-shadow: 10px 10px 0 #3D2B4A;
    animation: popIn 0.5s cubic-bezier(.17,.67,.35,1.4);
    max-width: 380px; width: 90%;
  }
  .win-emoji { font-size: 3.5rem; }
  .win-title { font-family: 'M PLUS Rounded 1c', sans-serif; font-size: 1.9rem; font-weight: 800; color: #3D2B4A; margin: 8px 0 5px; }
  .win-score { font-size: 1rem; color: #3D2B4A; font-weight: 700; margin-bottom: 18px; }
  #restart-btn {
    background: #FFE999; border: 2.5px solid #3D2B4A;
    border-radius: 999px; padding: 11px 32px;
    font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 0.95rem;
    cursor: pointer; box-shadow: 4px 4px 0 #3D2B4A;
    transition: transform 0.1s, box-shadow 0.1s;
  }
  #restart-btn:hover { transform: translate(-2px,-2px); box-shadow: 6px 6px 0 #3D2B4A; }

  /* CONFETTI */
  .confetti-piece {
    position: fixed; border-radius: 2px; top: -20px;
    animation: confettiFall linear forwards;
    z-index: 300; pointer-events: none;
  }
  @keyframes confettiFall {
    0%   { transform: translateY(0) rotate(0deg); opacity: 1; }
    100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
  }
  @keyframes popIn {
    0%   { transform: scale(0.5); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
  }

  .capy-deco { position: fixed; bottom: 10px; right: 14px; font-size: 1.8rem; opacity: 0.45; pointer-events: none; user-select: none; }
</style>
</head>
<body>

<header>

</div>

</div>

<!-- Win Screen -->
<div id="win-screen">

// Pairs per level (30 levels, level 30 = bonus extreme)
function pairsForLevel(lvl) {
  if (lvl <= 5)  return 3 + lvl - 1;          // 3–7
  if (lvl <= 10) return 7 + lvl - 5;           // 8–12
  if (lvl <= 15) return 12 + lvl - 10;         // 13–17
  if (lvl <= 20) return 17 + lvl - 15;         // 18–22
  if (lvl <= 25) return 22 + lvl - 20;         // 23–27
  if (lvl <= 29) return 27 + lvl - 25;         // 28–30 (but capped)
  return 35; // Level 30 bonus: max cards
}

const BONUS_TIME  = 180; // 3 minutes
const HINT_COST   = 10;

    document.body.style.backgroundImage = `radial-gradient(circle at 20% 30%, ${t.blob1} 0%, transparent 50%), radial-gradient(circle at 80% 70%, ${t.blob2} 0%, transparent 50%)`;
  } else {
    document.body.style.background = t.bg;
    document.body.style.backgroundImage = `radial-gradient(circle at 15% 20%, ${t.blob1} 0%, transparent 40%), radial-gradient(circle at 85% 80%, ${t.blob2} 0%, transparent 40%), radial-gradient(circle at 50% 50%, rgba(199,178,224,0.15) 0%, transparent 60%)`;
  }
}

// ── START LEVEL ───────────────────────────────────────────────────────────
function startLevel(lvl) {
  level = lvl;
  pairsFound = 0; flipped = []; locked = false; matchedCount = 0; hintsUsed = 0;
  isBonusRound = (lvl === BONUS_LEVEL);

  clearTimer();
  applyBackground(lvl);

  const numPairs = Math.min(pairsForLevel(lvl), ALL_CARDS.length);
  totalPairs = numPairs;

  // Shuffle and pick cards
  const pool = shuffle([...ALL_CARDS]);
  const chosen = pool.slice(0, numPairs);

  // Build deck
  const deck = [];
  chosen.forEach((c, i) => {
    deck.push({ animal: c, pairId: i });
    deck.push({ animal: c, pairId: i });
  });
  shuffle(deck);

  // Grid columns
  const totalCards = numPairs * 2;
  const cols = totalCards <= 8 ? 4 : totalCards <= 16 ? 5 : totalCards <= 24 ? 6 : totalCards <= 36 ? 6 : 7;
  const maxW = Math.min(window.innerWidth, 720);
  const cardSize = Math.min(100, Math.floor((maxW - 24 - (cols-1)*8) / cols));

  const board = document.getElementById('board');
  board.innerHTML = '';
  board.style.gridTemplateColumns = `repeat(${cols}, ${cardSize}px)`;

  const backIcon = BACK_ICONS[(lvl - 1) % BACK_ICONS.length];
  const isBonus  = isBonusRound;

  deck.forEach((c, idx) => {
    const el = document.createElement('div');
    el.className = 'card';
    el.dataset.pair = c.pairId;
    el.innerHTML = `
      <div class="card-inner">
        <div class="card-back ${isBonus ? 'bonus-back' : ''}">
          <div class="card-back-emoji">${backIcon.emoji}</div>
          <div class="card-back-label">${backIcon.label}</div>
        </div>
        <div class="card-front">
          <div class="card-emoji">${c.animal.emoji}</div>
          <div class="card-label">${c.animal.name}</div>
        </div>
      </div>`;
    el.addEventListener('click', () => onCardClick(el));
    board.appendChild(el);
  });

  updateHUD();

  // Hint button: level 5+
  document.getElementById('hint-btn').style.display = lvl >= 5 ? 'inline-block' : 'none';
  document.getElementById('hint-msg').textContent = '';

  // Timer for bonus round
  const timerPill = document.getElementById('timer-pill');
  if (isBonusRound) {
    timeLeft = BONUS_TIME;
    timerPill.style.display = 'flex';
    updateTimerDisplay();
    timerInterval = setInterval(tickTimer, 1000);
  } else {
    timerPill.style.display = 'none';
  }
}

function updateHUD() {
  document.getElementById('score-display').textContent  = score;
  document.getElementById('level-display').textContent  = level;
  document.getElementById('pairs-display').textContent  = pairsFound;
  document.getElementById('total-pairs').textContent    = totalPairs;
}

// ── TIMER ─────────────────────────────────────────────────────────────────
function tickTimer() {
  timeLeft--;
  updateTimerDisplay();
  if (timeLeft <= 0) {
    clearTimer();
    onBonusTimeout();
  }
}

function updateTimerDisplay() {
  const m = Math.floor(timeLeft / 60);
  const s = timeLeft % 60;
  document.getElementById('timer-display').textContent = `${m}:${s.toString().padStart(2,'0')}`;
  const pill = document.getElementById('timer-pill');
  if (timeLeft <= 30) pill.classList.add('urgent');
  else pill.classList.remove('urgent');
}

function clearTimer() {
  if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
}

function onBonusTimeout() {
  locked = true;
  document.getElementById('timeout-screen').classList.add('show');
}

document.getElementById('retry-bonus-btn').addEventListener('click', () => {
  document.getElementById('timeout-screen').classList.remove('show');
  startLevel(BONUS_LEVEL);
});

// ── CARD CLICK ────────────────────────────────────────────────────────────
function onCardClick(card) {
  if (locked) return;
  if (card.classList.contains('flipped') || card.classList.contains('matched')) return;
  if (flipped.length >= 2) return;

  card.classList.add('flipped');
  flipped.push(card);

  if (flipped.length === 2) {
    locked = true;
    const [a, b] = flipped;
    if (a.dataset.pair === b.dataset.pair) {
      score += 5; pairsFound++; matchedCount++;
      setTimeout(() => {
        a.classList.add('matched'); b.classList.add('matched');
        flipped = []; locked = false;
        updateHUD();
        if (matchedCount === totalPairs) onLevelComplete();
      }, 350);
    } else {
      setTimeout(() => {
        a.classList.remove('flipped'); b.classList.remove('flipped');
        flipped = []; locked = false;
      }, 850);
    }
  }
}

// ── HINT ──────────────────────────────────────────────────────────────────
document.getElementById('hint-btn').addEventListener('click', () => {
  if (score < HINT_COST) {
    document.getElementById('hint-msg').textContent = `Need at least ${HINT_COST} pts to buy a hint!`;
    return;
  }
  score -= HINT_COST; updateHUD();

  const unmatched = [...document.querySelectorAll('.card:not(.matched):not(.flipped)')];
  const groups = {};
  unmatched.forEach(c => { const p = c.dataset.pair; if (!groups[p]) groups[p] = []; groups[p].push(c); });
  const valid = Object.values(groups).filter(g => g.length === 2);
  if (!valid.length) return;

  const pair = valid[Math.floor(Math.random() * valid.length)];
  pair.forEach(c => { c.classList.add('hint-glow'); setTimeout(() => c.classList.remove('hint-glow'), 1400); });
  document.getElementById('hint-msg').textContent = `💡 ${CLUES[hintsUsed++ % CLUES.length]}`;
});

// ── LEVEL COMPLETE ────────────────────────────────────────────────────────
function onLevelComplete() {
  clearTimer();
  launchConfetti(isBonusRound ? 200 : 60);

  const bannerBox = document.getElementById('banner-box');
  const isLast    = level === BONUS_LEVEL;
  const nextIsBonus = level === BONUS_LEVEL - 1;

  if (isLast) {
    bannerBox.className = 'banner-box bonus-box';
    document.getElementById('banner-emoji').textContent = '🏆';
    document.getElementById('banner-title').textContent = 'BONUS COMPLETE!';
    document.getElementById('banner-sub').textContent   = `LEGENDARY! Final Score: ${score} pts`;
    const btn = document.getElementById('banner-btn');
    btn.textContent = 'See Results 🏆'; btn.className = '';
  } else if (nextIsBonus) {
    bannerBox.className = 'banner-box bonus-box';
    document.getElementById('banner-emoji').textContent = '⚡';
    document.getElementById('banner-title').textContent = `Level ${level} Complete!`;
    document.getElementById('banner-sub').textContent   = `BONUS ROUND UNLOCKED! 3-minute time limit — extremely hard!`;
    const btn = document.getElementById('banner-btn');
    btn.textContent = 'Enter Bonus Round ⚡'; btn.className = 'bonus-start-btn';
  } else {
    bannerBox.className = 'banner-box';
    document.getElementById('banner-emoji').textContent = '🎉';
    document.getElementById('banner-title').textContent = `Level ${level} Complete!`;
    document.getElementById('banner-sub').textContent   = `${pairsFound} pairs matched! Score: ${score} pts`;
    const btn = document.getElementById('banner-btn');
    btn.textContent = 'Next Level →'; btn.className = '';
  }

  setTimeout(() => document.getElementById('level-banner').classList.add('show'), 600);
}

document.getElementById('banner-btn').addEventListener('click', () => {
  document.getElementById('level-banner').classList.remove('show');
  if (level >= BONUS_LEVEL) {
    showWin();
  } else {
    startLevel(level + 1);
  }
});

function showWin() {
  document.getElementById('win-score-text').textContent = `Final Score: ${score} pts`;
  document.getElementById('win-screen').classList.add('show');
  launchConfetti(180);
}

document.getElementById('restart-btn').addEventListener('click', () => {
  document.getElementById('win-screen').classList.remove('show');
  score = 0; startLevel(1);
});

// ── CONFETTI ──────────────────────────────────────────────────────────────
function launchConfetti(n) {
  for (let i = 0; i < n; i++) {
    setTimeout(() => {
      const el = document.createElement('div');
      el.className = 'confetti-piece';
      el.style.left = Math.random() * 100 + 'vw';
      el.style.background = CONFETTI_COLOURS[Math.floor(Math.random() * CONFETTI_COLOURS.length)];
      el.style.width  = (8 + Math.random() * 10) + 'px';
      el.style.height = (8 + Math.random() * 10) + 'px';
      el.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
      const dur = 1.5 + Math.random() * 2.5;
      el.style.animationDuration = dur + 's';
      document.body.appendChild(el);
      setTimeout(() => el.remove(), dur * 1000);
    }, i * 25);
  }
}

// ── UTILS ─────────────────────────────────────────────────────────────────
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

// ── GO! ───────────────────────────────────────────────────────────────────
startLevel(1);
</script>
