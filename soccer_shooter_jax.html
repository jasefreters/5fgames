<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Soccer Shooter – Jax's Goalkeeper Game</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Arial Black', Arial, sans-serif;
    background: linear-gradient(180deg, #4fc3f7 0%, #81d4fa 40%, #a5d6a7 40%, #66bb6a 55%, #388e3c 100%);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow: hidden;
    position: relative;
  }

  /* Clouds */
  .cloud {
    position: absolute;
    background: white;
    border-radius: 50px;
    opacity: 0.85;
  }
  .cloud::before, .cloud::after {
    content: '';
    position: absolute;
    background: white;
    border-radius: 50%;
  }
  .c1 { width: 120px; height: 40px; top: 60px; left: 8%; animation: drift 18s linear infinite; }
  .c1::before { width: 60px; height: 60px; top: -30px; left: 15px; }
  .c1::after  { width: 40px; height: 40px; top: -20px; left: 55px; }
  .c2 { width: 90px; height: 30px; top: 90px; left: 55%; animation: drift 24s linear infinite 4s; }
  .c2::before { width: 45px; height: 45px; top: -22px; left: 10px; }
  .c2::after  { width: 35px; height: 35px; top: -15px; left: 42px; }
  .c3 { width: 70px; height: 25px; top: 40px; right: 15%; animation: drift 20s linear infinite 8s; }
  .c3::before { width: 35px; height: 35px; top: -17px; left: 8px; }
  .c3::after  { width: 28px; height: 28px; top: -12px; left: 33px; }
  @keyframes drift { from { transform: translateX(0); } to { transform: translateX(30px); } }

  /* Scoreboard */
  #scoreboard {
    position: absolute;
    top: 12px;
    left: 14px;
    background: rgba(0,0,20,0.82);
    border: 3px solid gold;
    border-radius: 12px;
    padding: 8px 16px;
    color: white;
    min-width: 120px;
    z-index: 100;
  }
  #scoreboard .label { font-size: 10px; color: gold; letter-spacing: 1px; text-transform: uppercase; }
  #scoreboard .score { font-size: 28px; font-weight: 900; color: white; line-height: 1; }
  #scoreboard .target { font-size: 11px; color: #aaa; margin-top: 2px; }

  /* Title */
  #title {
    margin-top: 14px;
    font-size: 28px;
    font-weight: 900;
    color: white;
    text-shadow: 2px 3px 0 #1565c0, 0 0 20px rgba(0,0,0,0.4);
    letter-spacing: 1px;
    z-index: 10;
  }

  /* Game area */
  #game-area {
    position: relative;
    width: 500px;
    height: 380px;
    margin-top: 10px;
    z-index: 10;
  }

  /* Goal */
  #goal {
    position: absolute;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%);
    width: 320px;
    height: 160px;
    border: 8px solid white;
    border-bottom: none;
    background: rgba(255,255,255,0.12);
    /* net lines */
    background-image:
      repeating-linear-gradient(90deg, rgba(255,255,255,0.15) 0, rgba(255,255,255,0.15) 1px, transparent 1px, transparent 32px),
      repeating-linear-gradient(0deg,  rgba(255,255,255,0.15) 0, rgba(255,255,255,0.15) 1px, transparent 1px, transparent 32px);
    border-radius: 4px 4px 0 0;
  }
  .goal-post {
    position: absolute;
    bottom: 72px;
    width: 14px;
    height: 170px;
    background: white;
    border-radius: 4px;
  }
  #post-left  { left: calc(50% - 167px); }
  #post-right { left: calc(50% + 153px); }
  #crossbar {
    position: absolute;
    bottom: 232px;
    left: calc(50% - 167px);
    width: 334px;
    height: 14px;
    background: white;
    border-radius: 4px;
  }

  /* Goalkeeper */
  #keeper {
    position: absolute;
    bottom: 88px;
    left: 50%;
    transform: translateX(-50%);
    width: 70px;
    height: 90px;
    transition: left 0.12s ease, transform 0.12s ease;
    z-index: 20;
  }
  #keeper svg { width: 100%; height: 100%; }

  /* Ball */
  #ball {
    position: absolute;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #fff, #ddd 40%, #222 100%);
    border: 2px solid #222;
    display: none;
    z-index: 30;
    box-shadow: 2px 2px 8px rgba(0,0,0,0.4);
  }

  /* Buttons */
  #controls {
    display: flex;
    gap: 16px;
    margin-top: 8px;
    z-index: 10;
  }
  .dive-btn {
    padding: 16px 32px;
    font-size: 18px;
    font-weight: 900;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 1px;
    transition: transform 0.1s, box-shadow 0.1s;
    box-shadow: 0 5px 0 rgba(0,0,0,0.3);
  }
  .dive-btn:active { transform: translateY(3px); box-shadow: 0 2px 0 rgba(0,0,0,0.3); }
  #btn-left  { background: #1565c0; color: gold; }
  #btn-center { background: #f57f17; color: white; }
  #btn-right { background: #1b5e20; color: gold; }

  /* Instruction */
  #instruction {
    font-size: 15px;
    color: white;
    text-shadow: 1px 1px 3px rgba(0,0,0,0.7);
    margin-top: 6px;
    z-index: 10;
    min-height: 22px;
    font-weight: bold;
  }

  /* Fast ball indicator */
  #fast-ball-warning {
    position: absolute;
    top: 12px;
    right: 14px;
    background: #f44336;
    color: white;
    font-size: 13px;
    font-weight: 900;
    padding: 6px 12px;
    border-radius: 10px;
    display: none;
    animation: pulse 0.4s infinite alternate;
    z-index: 100;
  }
  @keyframes pulse { from { opacity: 1; } to { opacity: 0.5; } }

  /* Overlay */
  #overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 200;
  }
  #overlay-box {
    background: linear-gradient(135deg, #1565c0, #0d47a1);
    border: 4px solid gold;
    border-radius: 20px;
    padding: 36px 48px;
    text-align: center;
    color: white;
    max-width: 360px;
  }
  #overlay-box h1 { font-size: 32px; color: gold; margin-bottom: 10px; }
  #overlay-box p  { font-size: 16px; margin-bottom: 20px; color: #cce; }
  #overlay-box .final { font-size: 22px; font-weight: 900; color: white; margin: 10px 0; }
  #start-btn {
    padding: 14px 36px;
    font-size: 20px;
    font-weight: 900;
    border: none;
    border-radius: 12px;
    background: gold;
    color: #1565c0;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 1px;
    box-shadow: 0 4px 0 #b8860b;
    transition: transform 0.1s;
  }
  #start-btn:active { transform: translateY(3px); }

  /* Confetti */
  .confetti-piece {
    position: fixed;
    width: 10px;
    height: 10px;
    top: -10px;
    z-index: 300;
    border-radius: 2px;
    animation: fall linear forwards;
  }
  @keyframes fall {
    to { transform: translateY(110vh) rotate(720deg); opacity: 0; }
  }

  /* Result flash */
  #result-flash {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 60px;
    font-weight: 900;
    pointer-events: none;
    z-index: 250;
    opacity: 0;
    text-shadow: 3px 3px 10px rgba(0,0,0,0.5);
    transition: opacity 0.1s;
  }

  /* Ground strip */
  #ground {
    position: absolute;
    bottom: 0;
    width: 100%;
    height: 80px;
    background: linear-gradient(0deg, #2e7d32, #43a047);
    border-top: 4px solid white;
    z-index: 5;
  }

  /* Keyboard hint */
  #key-hint {
    font-size: 12px;
    color: rgba(255,255,255,0.7);
    margin-top: 4px;
    z-index: 10;
  }
</style>
</head>
<body>

<!-- Clouds -->
<div class="cloud c1"></div>
<div class="cloud c2"></div>
<div class="cloud c3"></div>

<!-- Scoreboard (top-left) -->
<div id="scoreboard">
  <div class="label">Score</div>
  <div class="score" id="score-display">0</div>
  <div class="target">First to 20 wins!</div>
</div>

<!-- Fast ball warning -->
<div id="fast-ball-warning">⚡ FAST BALL!</div>

<div id="title">⚽ Soccer Shooter</div>

<div id="game-area">
  <!-- Goal structure -->
  <div id="goal"></div>
  <div class="goal-post" id="post-left"></div>
  <div class="goal-post" id="post-right"></div>
  <div id="crossbar"></div>

  <!-- Goalkeeper -->
  <div id="keeper">
    <svg viewBox="0 0 70 90" xmlns="http://www.w3.org/2000/svg">
      <!-- Body (gold kit) -->
      <rect x="20" y="38" width="30" height="32" rx="4" fill="#f9a825"/>
      <!-- Number on shirt -->
      <text x="35" y="57" text-anchor="middle" font-size="11" font-weight="bold" fill="#1565c0">1</text>
      <!-- Head -->
      <circle cx="35" cy="26" r="14" fill="#FDBCB4"/>
      <!-- Hair -->
      <ellipse cx="35" cy="14" rx="13" ry="7" fill="#4a2c0a"/>
      <!-- Eyes -->
      <circle cx="30" cy="25" r="2" fill="#333"/>
      <circle cx="40" cy="25" r="2" fill="#333"/>
      <!-- Mouth -->
      <path d="M30 31 Q35 35 40 31" stroke="#c0786b" stroke-width="1.5" fill="none"/>
      <!-- Gloves -->
      <rect x="8"  y="40" width="14" height="10" rx="4" fill="#ff6f00"/>
      <rect x="48" y="40" width="14" height="10" rx="4" fill="#ff6f00"/>
      <!-- Legs -->
      <rect x="22" y="68" width="11" height="18" rx="3" fill="#1565c0"/>
      <rect x="37" y="68" width="11" height="18" rx="3" fill="#1565c0"/>
      <!-- Boots -->
      <rect x="20" y="82" width="14" height="8" rx="3" fill="#212121"/>
      <rect x="36" y="82" width="14" height="8" rx="3" fill="#212121"/>
    </svg>
  </div>

  <!-- Ball -->
  <div id="ball"></div>

  <!-- Ground -->
  <div id="ground"></div>
</div>

<p id="instruction">Press START to play!</p>

<!-- Controls -->
<div id="controls">
  <button class="dive-btn" id="btn-left"   onclick="dive('left')">⬅ Dive Left</button>
  <button class="dive-btn" id="btn-center" onclick="dive('center')">🙌 Stay</button>
  <button class="dive-btn" id="btn-right"  onclick="dive('right')">Dive Right ➡</button>
</div>

<p id="key-hint">Keyboard: ← Left &nbsp;|&nbsp; ↑ Stay &nbsp;|&nbsp; → Right</p>

<!-- Result flash -->
<div id="result-flash"></div>

<!-- Overlay (start / game over) -->
<div id="overlay">
  <div id="overlay-box">
    <h1 id="overlay-title">⚽ Soccer Shooter</h1>
    <p id="overlay-msg">You're the goalkeeper! Dive left, right, or stay to save shots. First to reach 20 points wins!</p>
    <p id="overlay-final" class="final"></p>
    <button id="start-btn" onclick="startGame()">KICK OFF!</button>
  </div>
</div>

<script>
  // --- State ---
  let score = 0;
  let shotCount = 0;
  let keeperPos = 'center'; // 'left', 'center', 'right'
  let ballTarget = 'center';
  let waiting = true;
  let isFastBall = false;
  let ballTimeout = null;
  let animating = false;
  const WIN_SCORE = 20;

  const keeper = document.getElementById('keeper');
  const ball = document.getElementById('ball');
  const scoreDisplay = document.getElementById('score-display');
  const instruction = document.getElementById('instruction');
  const flashEl = document.getElementById('result-flash');
  const fastWarn = document.getElementById('fast-ball-warning');

  // Keeper positions (left% from center of game-area)
  const KEEPER_POS = {
    left:   { left: '22%', transform: 'translateX(-50%)' },
    center: { left: '50%', transform: 'translateX(-50%)' },
    right:  { left: '78%', transform: 'translateX(-50%)' }
  };

  // Ball target landing positions (in game-area)
  const BALL_TARGETS = {
    left:   { left: '28%', bottom: '120px' },
    center: { left: '50%', bottom: '115px' },
    right:  { left: '72%', bottom: '120px' }
  };

  // Ball start
  const BALL_START = { left: '50%', bottom: '30px' };

  function startGame() {
    score = 0;
    shotCount = 0;
    scoreDisplay.textContent = '0';
    document.getElementById('overlay').style.display = 'none';
    resetKeeper();
    waiting = true;
    animating = false;
    instruction.textContent = 'Here comes the shot! Get ready...';
    setTimeout(launchShot, 1200);
  }

  function resetKeeper() {
    keeperPos = 'center';
    keeper.style.left = '50%';
    keeper.style.transform = 'translateX(-50%)';
    keeper.style.transition = 'left 0.12s ease, transform 0.12s ease';
  }

  function launchShot() {
    if (animating) return;
    animating = true;
    waiting = false;
    shotCount++;
    resetKeeper();

    // Every 3 saves = fast ball
    const savesSoFar = Math.max(0, score);
    isFastBall = (shotCount > 1 && shotCount % 3 === 0);

    // Pick a random target
    const targets = ['left', 'center', 'right'];
    ballTarget = targets[Math.floor(Math.random() * 3)];

    const speed = isFastBall ? 350 : 800;

    if (isFastBall) {
      fastWarn.style.display = 'block';
      instruction.textContent = '⚡ FAST BALL — react quickly!';
    } else {
      fastWarn.style.display = 'none';
      instruction.textContent = 'Choose your move!';
    }

    // Show ball at bottom centre
    ball.style.display = 'block';
    ball.style.left = BALL_START.left;
    ball.style.bottom = BALL_START.bottom;
    ball.style.transform = 'translate(-50%, 0)';
    ball.style.transition = 'none';
    ball.style.top = 'auto';

    // Animate ball toward target
    const target = BALL_TARGETS[ballTarget];
    setTimeout(() => {
      ball.style.transition = `left ${speed}ms ease-in, bottom ${speed}ms ease-in`;
      ball.style.left = target.left;
      ball.style.bottom = target.bottom;
    }, 30);

    // After ball arrives
    ballTimeout = setTimeout(() => {
      resolveShot();
    }, speed + 60);
  }

  function dive(direction) {
    if (!animating || waiting) return;
    // Cancel pending resolution — player acted
    // (we let the ball animate, record the dive)
    keeperPos = direction;
    applyKeeperPos(direction);
  }

  function applyKeeperPos(pos) {
    const p = KEEPER_POS[pos];
    keeper.style.left = p.left;
    keeper.style.transform = p.transform + (pos === 'left' ? ' scaleX(-1)' : pos === 'right' ? ' scaleX(1)' : '');
  }

  function resolveShot() {
    fastWarn.style.display = 'none';
    const saved = (keeperPos === ballTarget);

    if (saved) {
      score++;
      flash('SAVED! 🧤', '#43a047', '+1');
      spawnConfetti();
      instruction.textContent = `Great save! Score: ${score}`;
    } else {
      score--;
      flash('GOAL! ⚽', '#e53935', '-1');
      instruction.textContent = `It's in! Score: ${score}`;
    }

    scoreDisplay.textContent = score;

    // Hide ball
    setTimeout(() => {
      ball.style.display = 'none';
      animating = false;

      if (score >= WIN_SCORE) {
        endGame(true);
        return;
      }

      // Next shot after delay
      setTimeout(launchShot, 1400);
    }, 700);
  }

  function flash(emoji, color, change) {
    flashEl.textContent = emoji;
    flashEl.style.color = color;
    flashEl.style.opacity = '1';
    setTimeout(() => { flashEl.style.opacity = '0'; }, 800);
  }

  function endGame(won) {
    const overlay = document.getElementById('overlay');
    const title = document.getElementById('overlay-title');
    const msg = document.getElementById('overlay-msg');
    const final = document.getElementById('overlay-final');
    const btn = document.getElementById('start-btn');

    title.textContent = won ? '🏆 You Win!' : '😅 Game Over';
    msg.textContent = won
      ? `Amazing goalkeeping! You reached ${WIN_SCORE} points!`
      : `Shots faced: ${shotCount}. Better luck next time!`;
    final.textContent = `Final Score: ${score}`;
    btn.textContent = 'PLAY AGAIN';
    overlay.style.display = 'flex';
  }

  // --- Confetti ---
  function spawnConfetti() {
    const colours = ['#FFD700','#1565c0','#f44336','#4caf50','#ff9800','#e91e63','#fff'];
    for (let i = 0; i < 40; i++) {
      const c = document.createElement('div');
      c.className = 'confetti-piece';
      c.style.left = Math.random() * 100 + 'vw';
      c.style.background = colours[Math.floor(Math.random() * colours.length)];
      c.style.animationDuration = (1.5 + Math.random() * 1.5) + 's';
      c.style.animationDelay = (Math.random() * 0.3) + 's';
      c.style.width = c.style.height = (8 + Math.random() * 10) + 'px';
      document.body.appendChild(c);
      setTimeout(() => c.remove(), 3000);
    }
  }

  // --- Keyboard controls ---
  document.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowLeft')  dive('left');
    if (e.key === 'ArrowRight') dive('right');
    if (e.key === 'ArrowUp')    dive('center');
  });
</script>
</body>
</html>
